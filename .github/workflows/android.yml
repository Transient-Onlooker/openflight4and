name: Android CI

on:
  push:
    branches: ["main"]
    tags: ["v*", "V*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-debug:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          MAPS3D_API_KEY: ${{ secrets.MAPS3D_API_KEY }}
        run: ./gradlew assembleDebug

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: openflight4and-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  release-apk:
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          MAPS3D_API_KEY: ${{ secrets.MAPS3D_API_KEY }}
        run: ./gradlew assembleDebug

      - name: Rename APK for release
        run: cp app/build/outputs/apk/debug/app-debug.apk "openflight4and-${{ github.ref_name }}-debug.apk"

      - name: Create release if missing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" || gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes

      - name: Upload APK to release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "openflight4and-${{ github.ref_name }}-debug.apk" --clobber
