name: Android CI

on:
  push:
    branches: ["main"]
    tags: ["v*", "V*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-debug:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          MAPS3D_API_KEY: ${{ secrets.MAPS3D_API_KEY }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_REWARDED_AD_UNIT_ID: ${{ secrets.ADMOB_REWARDED_AD_UNIT_ID }}
          REDEEM_API_BASE_URL: ${{ secrets.REDEEM_API_BASE_URL }}
          VERSION_API_BASE_URL: ${{ secrets.VERSION_API_BASE_URL }}
          OPENFLIGHT_RELEASES_URL: ${{ secrets.OPENFLIGHT_RELEASES_URL }}
          OPENFLIGHT_RELEASE_CHANNEL: stable
          OPENFLIGHT_VERSION_NAME: V2.8.9
        run: ./gradlew assembleDebug

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: openflight4and-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  release-apk:
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up release metadata
        id: release_meta
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          NORMALIZED_TAG="${TAG_NAME#V}"
          NORMALIZED_TAG="${NORMALIZED_TAG#v}"

          if [[ "$NORMALIZED_TAG" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-beta-([0-9]{4})$ ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "version_name=V${BASH_REMATCH[1]}.Beta.${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
            echo "gradle_task=assembleRelease" >> "$GITHUB_OUTPUT"
            echo "release_prerelease=true" >> "$GITHUB_OUTPUT"
          elif [[ "$NORMALIZED_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "version_name=V${NORMALIZED_TAG}" >> "$GITHUB_OUTPUT"
            echo "gradle_task=assembleRelease" >> "$GITHUB_OUTPUT"
            echo "release_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported tag format: ${TAG_NAME}"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release-keystore.jks

      - name: Build Release APK
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          MAPS3D_API_KEY: ${{ secrets.MAPS3D_API_KEY }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_REWARDED_AD_UNIT_ID: ${{ secrets.ADMOB_REWARDED_AD_UNIT_ID }}
          REDEEM_API_BASE_URL: ${{ secrets.REDEEM_API_BASE_URL }}
          VERSION_API_BASE_URL: ${{ secrets.VERSION_API_BASE_URL }}
          OPENFLIGHT_RELEASES_URL: ${{ secrets.OPENFLIGHT_RELEASES_URL }}
          OPENFLIGHT_RELEASE_CHANNEL: ${{ steps.release_meta.outputs.channel }}
          OPENFLIGHT_VERSION_NAME: ${{ steps.release_meta.outputs.version_name }}
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/release-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew ${{ steps.release_meta.outputs.gradle_task }}

      - name: Prepare release APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -maxdepth 1 -name "*.apk" ! -name "*-unsigned.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No signed release APK found in app/build/outputs/apk/release"
            find app/build/outputs/apk/release -maxdepth 1 -name "*.apk" -print
            exit 1
          fi
          cp "$APK_PATH" "openflight4and-${{ github.ref_name }}-release.apk"

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
            if [ "${{ steps.release_meta.outputs.release_prerelease }}" = "true" ]; then
              gh release edit "${{ github.ref_name }}" --title "${{ github.ref_name }}" --prerelease
            else
              gh release edit "${{ github.ref_name }}" --title "${{ github.ref_name }}"
            fi
          elif [ "${{ steps.release_meta.outputs.release_prerelease }}" = "true" ]; then
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes --prerelease
          else
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
          fi

      - name: Upload APK to release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "openflight4and-${{ github.ref_name }}-release.apk" --clobber

      - name: Install Wrangler
        if: steps.release_meta.outputs.channel == 'stable'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm install -g wrangler

      - name: Update recent version in Cloudflare D1
        if: steps.release_meta.outputs.channel == 'stable'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION="${{ steps.release_meta.outputs.version_name }}"
          wrangler d1 execute openflight-version-db --remote --command "INSERT INTO app_versions (platform, allowed_version, recent_version) VALUES ('android', '$VERSION', '$VERSION') ON CONFLICT(platform) DO UPDATE SET recent_version = excluded.recent_version, updated_at = CURRENT_TIMESTAMP;"
